# ── AgentHub 基础设施栈 ──
# 开发/生产共用：PostgreSQL (pgvector) + Redis + RabbitMQ
#
# 启动:  docker compose up -d
# 停止:  docker compose down
# 清理:  docker compose down -v   (删除数据卷)

services:
  # ── PostgreSQL 16 + pgvector 扩展 ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agenthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub
      POSTGRES_DB: agenthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub -d agenthub"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ──
  redis:
    image: redis:7-alpine
    container_name: agenthub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── RabbitMQ 3.x + Management UI ──
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: agenthub-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: agenthub
      RABBITMQ_DEFAULT_PASS: agenthub
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI (http://localhost:15672)
    volumes:
      - rabbitdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  redisdata:
  rabbitdata:
